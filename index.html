<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K.U - Input Layanan Mahasiswa</title>
    <link rel="stylesheet" href="CSS/style.css">
</head>
<body>
    <nav>
        <div class="nav-container">
            <span class="logo">Katawa University</span>
            <ul>
                <li><a href="index.html" class="active">Form Input</a></li>
                <li><a href="data.html">Tabel Data</a></li>
            </ul>
        </div>
    </nav>

    <main class="container">
        <div class="card">
            <h2>Form Input Data Layanan</h2>
            <form id="formLayanan">
                <div class="form-group">
                    <label for="nama">Nama Lengkap</label>
                    <input type="text" id="nama" required placeholder="Masukkan nama...">
                </div>
                
                <div class="form-group">
                    <label for="nim">NIM</label>
                    <input type="text" id="nim" required placeholder="Masukkan NIM...">
                </div>

                <div class="form-group">
                    <label for="jenisLayanan">Jenis Layanan</label>
                    <select id="jenisLayanan" required>
                        <option value="">-- Pilih Layanan --</option>
                        <option value="Akademik">Surat Keterangan Akademik</option>
                        <option value="Beasiswa">Pengajuan Beasiswa</option>
                        <option value="Fasilitas">Keluhan Fasilitas</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="keterangan">Keterangan</label>
                    <textarea id="keterangan" rows="4" required placeholder="Tambahkan detail keterangan..."></textarea>
                </div>

                <button type="submit" class="btn-submit">Simpan Data</button>
            </form>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>

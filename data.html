<head>

    <title>K.U - Data Layanan Mahasiswa</title>
    <link rel="stylesheet" href="CSS/style.css">
</head>
<body>
    <nav>
        <div class="nav-container">

                <table id="tabelData">

                        <tr>
                            <th>No</th>
                            <th>Nama</th>

                        </tr>
                    </thead>
                    <tbody>
                        <!-- Data dari JS akan dirender di sini -->
                    </tbody>
                </table>
            </div>
        </div>
